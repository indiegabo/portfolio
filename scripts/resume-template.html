<!DOCTYPE html>
<html lang="{{LANG}}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}}</title>
    <style>
{{STYLE}}
    </style>
  </head>
  <body>
    <main class="resume-sheet">
      <div class="brand-banner">
        <img src="{{TAG_SRC}}" alt="{{NAME}}" />
      </div>

      <header class="resume-hero">
        <div class="resume-hero-copy">
          <p class="eyebrow">{{EYEBROW}}</p>
          <h1>{{NAME}}</h1>
          <h2>{{HEADLINE}}</h2>
          <p class="summary">{{SUMMARY}}</p>
        </div>
        <div class="resume-hero-visual">
          <div class="portrait-frame">
            <img src="{{PORTRAIT_SRC}}" alt="{{NAME}}" />
          </div>
          <div class="avatar-frame">
            <img src="{{AVATAR_SRC}}" alt="{{NAME}} avatar" />
          </div>
        </div>
      </header>

      <section class="resume-section contact-section">
        <h2>{{CONTACT_TITLE}}</h2>
        <ul class="contact-list">
{{CONTACT_ITEMS}}
        </ul>
      </section>

{{SKILLS_SECTION}}
{{PROFICIENCY_SECTION}}
{{EXPERIENCE_SECTION}}
{{EDUCATION_SECTION}}
{{FEATURED_PROJECTS_SECTION}}
{{ASSET_PROJECTS_SECTION}}
{{OPEN_SOURCE_SECTION}}
    </main>
  </body>
</html>
